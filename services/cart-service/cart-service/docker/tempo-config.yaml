server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 48h

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

# For production replace backend: local with:
# backend: s3
# s3:
#   bucket: ${TEMPO_S3_BUCKET}
#   endpoint: s3.amazonaws.com
#   region: ${AWS_REGION}
