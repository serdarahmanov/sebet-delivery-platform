services:

  # ── Application ────────────────────────────────────────────────────────────

  cart-service:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/cartdb
      - SPRING_DATASOURCE_USERNAME=cart
      - SPRING_DATASOURCE_PASSWORD=cart
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      # OTel Java Agent — reads these env vars directly at JVM startup
      - OTEL_SERVICE_NAME=cart-service
      - OTEL_SERVICE_VERSION=0.0.1-SNAPSHOT
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=none
      - OTEL_LOGS_EXPORTER=none
      - OTEL_PROPAGATORS=tracecontext,baggage
      # Sampling — controlled by the OTel agent, not Spring Boot.
      # Switch to parentbased_traceidratio + OTEL_TRACES_SAMPLER_ARG=0.1 to reduce volume.
      - OTEL_TRACES_SAMPLER=parentbased_always_on
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=local
    depends_on:
      - redis
      - postgres
      - kafka
      - otel-collector

  # ── Infrastructure ──────────────────────────────────────────────────────────

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cartdb
      POSTGRES_USER: cart
      POSTGRES_PASSWORD: cart
    ports:
      - "5432:5432"

  kafka:
    image: apache/kafka:3.8.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # ── Observability stack ─────────────────────────────────────────────────────

  otel-collector:
    image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.111.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./docker/otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP (useful for browser/curl debugging)
      - "8889:8889"   # Prometheus exporter — service-graph metrics
    depends_on:
      - tempo

  tempo:
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
      - ./docker/tempo-config.yaml:/etc/tempo/config.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP API (Grafana queries here)

  prometheus:
    image: prom/prometheus:v2.55.0
    command:
      - '--config.file=/etc/prometheus/prometheus.yaml'
      - '--enable-feature=exemplar-storage'
    volumes:
      - ./docker/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - cart-service

  grafana:
    image: grafana/grafana:11.3.0
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    depends_on:
      - tempo
      - prometheus

volumes:
  tempo-data:
  prometheus-data:
