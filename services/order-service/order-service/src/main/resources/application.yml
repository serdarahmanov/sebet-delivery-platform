spring:
  application:
    name: order-service

  jpa:
    open-in-view: false

  kafka:
    consumer:
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

order-service:
  idempotency:
    completed-retention: ${ORDER_SERVICE_IDEMPOTENCY_COMPLETED_RETENTION:PT168H}
    abandoned-in-progress-retention: ${ORDER_SERVICE_IDEMPOTENCY_ABANDONED_IN_PROGRESS_RETENTION:PT1H}
    cleanup-interval-ms: ${ORDER_SERVICE_IDEMPOTENCY_CLEANUP_INTERVAL_MS:600000}
  scheduled-order:
    min-lead-time-minutes: 60
    slot-interval-minutes: 15
    delivery-window-duration-minutes: 30
    modification-cutoff-minutes: 40
  store-service:
    base-url: http://localhost:8081
    fallback-open-time: "08:00"
    fallback-close-time: "19:00"
    fallback-working-days: "MONDAY,TUESDAY,WEDNESDAY,THURSDAY,FRIDAY,SATURDAY,SUNDAY"
  kafka:
    checkout-events:
      topic: checkout-events
      group-id: order-service
      auto-startup: false
      dlt-topic: checkout-events.DLT
      validate-topics: false
      retry:
        initial-interval-ms: ${ORDER_SERVICE_KAFKA_CHECKOUT_EVENTS_RETRY_INITIAL_INTERVAL_MS:1000}
        multiplier: ${ORDER_SERVICE_KAFKA_CHECKOUT_EVENTS_RETRY_MULTIPLIER:2.0}
        max-interval-ms: ${ORDER_SERVICE_KAFKA_CHECKOUT_EVENTS_RETRY_MAX_INTERVAL_MS:10000}
        max-attempts: ${ORDER_SERVICE_KAFKA_CHECKOUT_EVENTS_RETRY_MAX_ATTEMPTS:3}
      processed-events:
        in-progress-lease: ${ORDER_SERVICE_KAFKA_CHECKOUT_EVENTS_PROCESSED_EVENTS_IN_PROGRESS_LEASE:PT30S}
        completed-retention: ${ORDER_SERVICE_KAFKA_CHECKOUT_EVENTS_PROCESSED_EVENTS_COMPLETED_RETENTION:PT168H}
        abandoned-in-progress-retention: ${ORDER_SERVICE_KAFKA_CHECKOUT_EVENTS_PROCESSED_EVENTS_ABANDONED_IN_PROGRESS_RETENTION:PT1H}
        cleanup-interval-ms: ${ORDER_SERVICE_KAFKA_CHECKOUT_EVENTS_PROCESSED_EVENTS_CLEANUP_INTERVAL_MS:600000}
      in-progress-retry:
        interval-ms: ${ORDER_SERVICE_KAFKA_CHECKOUT_EVENTS_IN_PROGRESS_RETRY_INTERVAL_MS:5000}
        max-attempts: ${ORDER_SERVICE_KAFKA_CHECKOUT_EVENTS_IN_PROGRESS_RETRY_MAX_ATTEMPTS:12}
    order-events:
      topic: order-events
      group-id: order-service-driver-assignment-projection
      auto-startup: false
      dlt-topic: order-events.DLT
      validate-topics: false
