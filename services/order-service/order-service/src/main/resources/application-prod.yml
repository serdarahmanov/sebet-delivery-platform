spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

order-service:
  internal:
    secret: ${ORDER_SERVICE_INTERNAL_SECRET:}
  kafka:
    checkout-events:
      topic: ${ORDER_SERVICE_KAFKA_CHECKOUT_EVENTS_TOPIC:checkout-events}
      group-id: ${ORDER_SERVICE_KAFKA_CHECKOUT_EVENTS_GROUP_ID:order-service}
      auto-startup: ${ORDER_SERVICE_KAFKA_CHECKOUT_EVENTS_AUTO_STARTUP:true}
      dlt-topic: ${ORDER_SERVICE_KAFKA_CHECKOUT_EVENTS_DLT_TOPIC:checkout-events.DLT}
      validate-topics: ${ORDER_SERVICE_KAFKA_CHECKOUT_EVENTS_VALIDATE_TOPICS:true}
      retry:
        initial-interval-ms: ${ORDER_SERVICE_KAFKA_CHECKOUT_EVENTS_RETRY_INITIAL_INTERVAL_MS:1000}
        multiplier: ${ORDER_SERVICE_KAFKA_CHECKOUT_EVENTS_RETRY_MULTIPLIER:2.0}
        max-interval-ms: ${ORDER_SERVICE_KAFKA_CHECKOUT_EVENTS_RETRY_MAX_INTERVAL_MS:10000}
        max-attempts: ${ORDER_SERVICE_KAFKA_CHECKOUT_EVENTS_RETRY_MAX_ATTEMPTS:3}
    order-events:
      topic: ${ORDER_SERVICE_KAFKA_ORDER_EVENTS_TOPIC:order-events}
      group-id: ${ORDER_SERVICE_KAFKA_ORDER_EVENTS_GROUP_ID:order-service-driver-assignment-projection}
      auto-startup: ${ORDER_SERVICE_KAFKA_ORDER_EVENTS_AUTO_STARTUP:true}
      dlt-topic: ${ORDER_SERVICE_KAFKA_ORDER_EVENTS_DLT_TOPIC:order-events.DLT}
      validate-topics: ${ORDER_SERVICE_KAFKA_ORDER_EVENTS_VALIDATE_TOPICS:true}
